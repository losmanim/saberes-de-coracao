<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página Não Encontrada | O Caminho</title>
    <meta name="description" content="A página que você procura não existe.">
    <link rel="stylesheet" href="css/estilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: bold;
            color: var(--cor-destaque);
            line-height: 1;
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--sombra);
        }
        .error-title {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--cor-texto);
        }
        .error-message {
            max-width: 500px;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .error-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transicao);
        }
        .error-btn-primary {
            background: var(--cor-destaque);
            color: var(--cor-texto-escuro);
        }
        .error-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--sombra);
        }
        .error-btn-secondary {
            border: 2px solid var(--cor-borda);
            color: var(--cor-texto);
        }
        .error-btn-secondary:hover {
            border-color: var(--cor-destaque);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Página Não Encontrada</h1>
        <p class="error-message">
            A página que você procura pode ter sido removida, teve seu nome alterado ou está temporariamente indisponível.
        </p>
        <div class="error-actions">
            <a href="index.html" class="error-btn error-btn-primary">
                <i class="bi bi-house"></i> Voltar ao Início
            </a>
            <a href="index.html#conhecimento" class="error-btn error-btn-secondary">
                <i class="bi bi-book"></i> Explorar Conhecimento
            </a>
        </div>
    </div>
</body>
</html>
