<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa - Kundalini</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .capa {
            width: 1600px;
            height: 2560px;
            background: linear-gradient(135deg, #1a0a00 0%, #2d1810 50%, #4a1a00 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Elementos decorativos */
        .capa::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,140,0,0.1) 0%, transparent 50%);
            animation: rotate 20s linear infinite;
        }
        
        .capa::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: linear-gradient(to top, #1a0a00, transparent);
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Serpente simbolo */
        .simbolo {
            width: 400px;
            height: 400px;
            border: 8px solid #ff6600;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        
        .simbolo-inner {
            width: 300px;
            height: 300px;
            border: 4px solid #ff9900;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .simbolo-text {
            font-size: 120px;
            color: #ff6600;
            font-weight: bold;
        }
        
        /*Texto principal */
        .titulo {
            font-size: 140px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(255,100,0,0.5);
        }
        
        .subtitulo {
            font-size: 50px;
            color: #ff6600;
            margin-bottom: 60px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        
        /* Linha decorativa */
        .linha {
            width: 300px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #ff6600, transparent);
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        
        /* Texto inferior */
        .autor {
            font-size: 35px;
            color: #999;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .colecao {
            font-size: 30px;
            color: #ff6600;
            position: relative;
            z-index: 1;
        }
        
        /* Elementos de fogo nas bordas */
        .fire {
            position: absolute;
            font-size: 60px;
            color: rgba(255,100,0,0.3);
        }
        
        .fire-1 { top: 50px; left: 50px; }
        .fire-2 { top: 50px; right: 50px; }
        .fire-3 { bottom: 50px; left: 50px; }
        .fire-4 { bottom: 50px; right: 50px; }
    </style>
</head>
<body>
    <div class="capa">
        <span class="fire fire-1">🔥</span>
        <span class="fire fire-2">🔥</span>
        <span class="fire fire-3">🔥</span>
        <span class="fire fire-4">🔥</span>
        
        <div class="simbolo">
            <div class="simbolo-inner">
                <span class="simbolo-text">K</span>
            </div>
        </div>
        
        <h1 class="titulo">Kundalini</h1>
        <p class="subtitulo">O Que as Tradições Espirituais<br>Nunca Te Contam</p>
        
        <div class="linha"></div>
        
        <p class="autor">Coleção Saberes Antigos</p>
        <p class="colecao">• 2026 •</p>
    </div>
</body>
</html>
