<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capa - Hermetismo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .capa {
            width: 1600px;
            height: 2560px;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #2d1f4a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }
        
        /* Stars effect */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }
        
        .star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #9b59b6;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        
        /* Yin Yang symbol */
        .simbolo {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            position: relative;
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        
        .yin-yang {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(180deg, 
                #ffffff 0%, 
                #ffffff 50%, 
                #9b59b6 50%, 
                #9b59b6 100%
            );
            position: relative;
            overflow: hidden;
        }
        
        .yin-yang::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            background: #0d0d1a;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .yin-yang::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            background: #9b59b6;
            border-radius: 50%;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /*Main circle */
        .outer-ring {
            width: 500px;
            height: 500px;
            border: 4px solid rgba(155,89,182,0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        /* Texto principal */
        .titulo {
            font-size: 140px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(155,89,182,0.5);
        }
        
        .subtitulo {
            font-size: 50px;
            color: #9b59b6;
            margin-bottom: 60px;
            font-weight: 300;
            position: relative;
            z-index: 1;
        }
        
        /* Linha decorativa */
        .linha {
            width: 300px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #9b59b6, transparent);
            margin-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        
        /* Texto inferior */
        .autor {
            font-size: 35px;
            color: #666;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .colecao {
            font-size: 30px;
            color: #9b59b6;
            position: relative;
            z-index: 1;
        }
        
        /* 7 principles */
        .principles {
            position: absolute;
            bottom: 300px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1;
        }
        
        .principle {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(155,89,182,0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #9b59b6;
        }
    </style>
</head>
<body>
    <div class="capa">
        <!-- Stars will be generated by JS -->
        
        <div class="simbolo">
            <div class="yin-yang"></div>
        </div>
        <div class="outer-ring"></div>
        
        <h1 class="titulo">Hermetismo</h1>
        <p class="subtitulo">Os 7 Princípios Universais</p>
        
        <div class="linha"></div>
        
        <div class="principles">
            <span class="principle">1</span>
            <span class="principle">2</span>
            <span class="principle">3</span>
            <span class="principle">4</span>
            <span class="principle">5</span>
            <span class="principle">6</span>
            <span class="principle">7</span>
        </div>
        
        <p class="autor">Coleção Saberes Antigos</p>
        <p class="colecao">• 2026 •</p>
    </div>
</body>
</html>
